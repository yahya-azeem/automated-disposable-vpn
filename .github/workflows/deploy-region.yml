name: Deploy or Switch VPN Region

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Target AWS Region for the active VPN node'
        required: true
        default: 'us-east-1'
        type: choice
        options:
          - us-east-1
          - eu-central-1
          - ap-northeast-1

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Provisioning
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.tf_outputs.outputs.public_ip }}
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -var="active_region=${{ github.event.inputs.region }}" -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform Outputs
        id: tf_outputs
        working-directory: ./terraform
        run: |
          PUBLIC_IP=$(terraform output -raw public_ip)
          INSTANCE_ID=$(terraform output -raw instance_id)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Provisioned Instance ID: $INSTANCE_ID at Public IP: $PUBLIC_IP"

  ansible:
    name: Ansible Configuration & Client Profile Generation
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python & Ansible
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ansible

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Wait for EC2 SSH Readiness
        run: |
          echo "Waiting for SSH port 22 on ${{ needs.terraform.outputs.public_ip }}..."
          timeout 300 bash -c 'until nc -z -w 2 ${{ needs.terraform.outputs.public_ip }} 22; do echo "waiting..."; sleep 5; done'
          sleep 10 # Give OpenSSH server a moment to fully initialize

      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: |
          ansible-playbook -i "${{ needs.terraform.outputs.public_ip }}," playbook.yml \
            -e "public_ip=${{ needs.terraform.outputs.public_ip }}"

      - name: Upload Client Configuration Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-config
          path: ./ansible/client-config/client.conf
          retention-days: 1
