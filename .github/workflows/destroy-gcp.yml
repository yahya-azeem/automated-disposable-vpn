name: Destroy GCP VPN Infrastructure

on:
  repository_dispatch:
    types: [destroy_vpn_gcp]
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Clean All Region VPN Nodes
        run: |
          # Find all instances matching prefix trusttunnel-vpn- and delete them
          INSTANCES=$(gcloud compute instances list --filter="name ~ ^trusttunnel-vpn-" --format="value(name,zone)" 2>/dev/null)
          if [ -n "$INSTANCES" ]; then
            echo "Found matching instances to delete:"
            echo "$INSTANCES"
            echo "$INSTANCES" | while read -r name zone; do
              echo "Deleting instance $name in zone $zone..."
              gcloud compute instances delete "$name" --zone="$zone" --quiet
            done
          else
            echo "No matching instances found to delete."
          fi
