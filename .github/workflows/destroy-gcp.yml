name: Destroy GCP VPN Infrastructure

on:
  repository_dispatch:
    types: [destroy_vpn_gcp]
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Clean Existing Disposable VM
        run: |
          EXISTING_ZONE=$(gcloud compute instances list --filter="name=trusttunnel-vpn-node" --format="value(zone)" 2>/dev/null)
          if [ -n "$EXISTING_ZONE" ]; then
            echo "Existing disposable instance found in zone: $EXISTING_ZONE. Deleting..."
            gcloud compute instances delete trusttunnel-vpn-node --zone="$EXISTING_ZONE" --quiet
          else
            echo "No existing disposable instance found."
          fi
