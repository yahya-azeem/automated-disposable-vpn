name: Deploy TrustTunnel VPN to GCP

on:
  repository_dispatch:
    types: [deploy_vpn_gcp]
  workflow_dispatch:
    inputs:
      region:
        description: 'GCP Region'
        required: false
        default: 'us-central1'
      zone:
        description: 'GCP Zone'
        required: false
        default: 'us-central1-a'
      ddns_hostname:
        description: 'No-IP DDNS Hostname (e.g. vpn.hopto.org)'
        required: false
        default: ''
      ddns_username:
        description: 'No-IP Username/Email'
        required: false
        default: ''
      ddns_password:
        description: 'No-IP Password'
        required: false
        default: ''

env:
  GCP_REGION: ${{ github.event.inputs.region || github.event.client_payload.region || 'us-central1' }}
  GCP_ZONE: ${{ github.event.inputs.zone || github.event.client_payload.zone || 'us-central1-a' }}
  DDNS_HOSTNAME: ${{ github.event.inputs.ddns_hostname || github.event.client_payload.ddns_hostname || '' }}
  DDNS_USERNAME: ${{ github.event.inputs.ddns_username || github.event.client_payload.ddns_username || '' }}
  DDNS_PASSWORD: ${{ github.event.inputs.ddns_password || github.event.client_payload.ddns_password || '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry Repository Exists
        run: |
          gcloud artifacts repositories describe trusttunnel-repo --location=${{ env.GCP_REGION }} >/dev/null 2>&1 || \
          gcloud artifacts repositories create trusttunnel-repo \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --description="TrustTunnel Docker Repository"

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trusttunnel-repo/vpn:latest"
          docker build -t "$IMAGE_TAG" -f Dockerfile.prod .
          docker push "$IMAGE_TAG"

      - name: Clean Existing Disposable VM
        run: |
          if gcloud compute instances describe trusttunnel-vpn-node --zone=${{ env.GCP_ZONE }} >/dev/null 2>&1; then
            echo "Existing disposable instance found. Deleting..."
            gcloud compute instances delete trusttunnel-vpn-node --zone=${{ env.GCP_ZONE }} --quiet
          fi

      - name: Deploy VM with TrustTunnel Container
        run: |
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trusttunnel-repo/vpn:latest"
          gcloud compute instances create-with-container trusttunnel-vpn-node \
            --zone=${{ env.GCP_ZONE }} \
            --machine-type=e2-micro \
            --container-image="$IMAGE_TAG" \
            --container-privileged \
            --container-restart-policy=always \
            --container-mount-host-path mount-path=/root,host-path=/var/lib/trusttunnel,mode=rw \
            --container-env=DDNS_HOSTNAME="${{ env.DDNS_HOSTNAME }}",DDNS_USERNAME="${{ env.DDNS_USERNAME }}",DDNS_PASSWORD="${{ env.DDNS_PASSWORD }}" \
            --tags=trusttunnel-vpn \
            --scopes=https://www.googleapis.com/auth/cloud-platform \
            --boot-disk-size=10GB \
            --boot-disk-type=pd-standard

      - name: Ensure GCP Firewall Rules are Set
        run: |
          if ! gcloud compute firewall-rules describe allow-trusttunnel >/dev/null 2>&1; then
            echo "Creating firewall rule to allow TrustTunnel port 443..."
            gcloud compute firewall-rules create allow-trusttunnel \
              --allow=tcp:443 \
               --target-tags=trusttunnel-vpn \
              --description="Allow TrustTunnel VPN TCP port 443"
          else
            echo "Firewall rule already exists."
          fi

      - name: Wait for VPN Initialization
        run: |
          echo "Waiting 35 seconds for container setup, IP detection, and client profile generation..."
          sleep 35

      - name: Retrieve Client Configuration
        run: |
          # Use gcloud compute ssh to grab the generated client profile
          gcloud compute ssh trusttunnel-vpn-node \
            --zone=${{ env.GCP_ZONE }} \
            --quiet \
            --command="sudo cat /var/lib/trusttunnel/client.yaml" > client.yaml
          
          echo "Successfully retrieved client.yaml configuration."

      - name: Archive TrustTunnel Client Config
        uses: actions/upload-artifact@v4
        with:
          name: TrustTunnel-Client-Config
          path: client.yaml
          retention-days: 1
