name: Deploy TrustTunnel VPN to GCP

on:
  repository_dispatch:
    types: [deploy_vpn_gcp]
  workflow_dispatch:
    inputs:
      region:
        description: 'GCP Region'
        required: false
        default: 'us-central1'
      zone:
        description: 'GCP Zone'
        required: false
        default: 'us-central1-a'
      ddns_hostname:
        description: 'No-IP DDNS Hostname (e.g. vpn.hopto.org)'
        required: false
        default: ''
      ddns_username:
        description: 'No-IP Username/Email'
        required: false
        default: ''
      ddns_password:
        description: 'No-IP Password'
        required: false
        default: ''
      vpn_password:
        description: 'TrustTunnel VPN Client Password'
        required: false
        default: ''
      vpn_cert:
        description: 'Persistent Certificate'
        required: false
        default: ''
      vpn_key:
        description: 'Persistent Private Key'
        required: false
        default: ''

concurrency:
  group: gcp-vpn-deployment
  cancel-in-progress: true

env:
  GCP_REGION: ${{ github.event.inputs.region || github.event.client_payload.region || 'us-central1' }}
  GCP_ZONE: ${{ github.event.inputs.zone || github.event.client_payload.zone || 'us-central1-a' }}
  DDNS_HOSTNAME: ${{ github.event.inputs.ddns_hostname || github.event.client_payload.ddns_hostname || secrets.DDNS_HOSTNAME || '' }}
  DDNS_USERNAME: ${{ github.event.inputs.ddns_username || github.event.client_payload.ddns_username || secrets.DDNS_USERNAME || '' }}
  DDNS_PASSWORD: ${{ github.event.inputs.ddns_password || github.event.client_payload.ddns_password || secrets.DDNS_PASSWORD || '' }}
  VPN_PASSWORD: ${{ github.event.inputs.vpn_password || github.event.client_payload.vpn_password || '' }}
  VPN_CERT: ${{ github.event.inputs.vpn_cert || github.event.client_payload.vpn_cert || '' }}
  VPN_KEY: ${{ github.event.inputs.vpn_key || github.event.client_payload.vpn_key || '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy GCE VM (Upsert & Start/Stop)
        run: |
          TARGET_INSTANCE="trusttunnel-vpn-${{ env.GCP_REGION }}"
          TARGET_ZONE="${{ env.GCP_ZONE }}"
          IMAGE_TAG="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trusttunnel-repo/vpn:latest"
          
          # Check if target instance exists, create if missing, else update metadata
          if ! gcloud compute instances describe "$TARGET_INSTANCE" --zone="$TARGET_ZONE" >/dev/null 2>&1; then
              echo "Creating target instance $TARGET_INSTANCE..."
              gcloud compute instances create-with-container "$TARGET_INSTANCE" \
                --zone="$TARGET_ZONE" \
                --machine-type=e2-micro \
                --container-image="$IMAGE_TAG" \
                --container-privileged \
                --container-restart-policy=always \
                --container-mount-host-path mount-path=/root,host-path=/var/lib/trusttunnel,mode=rw \
                --tags=trusttunnel-vpn \
                --scopes=https://www.googleapis.com/auth/cloud-platform \
                --boot-disk-size=10GB \
                --boot-disk-type=pd-standard \
                --metadata=ddns_hostname="${{ env.DDNS_HOSTNAME }}",ddns_username="${{ env.DDNS_USERNAME }}",ddns_password="${{ env.DDNS_PASSWORD }}",vpn_password="${{ env.VPN_PASSWORD }}",vpn_cert="${{ env.VPN_CERT }}",vpn_key="${{ env.VPN_KEY }}"
          else
              echo "Updating metadata for target instance $TARGET_INSTANCE..."
              gcloud compute instances add-metadata "$TARGET_INSTANCE" \
                --zone="$TARGET_ZONE" \
                --metadata=ddns_hostname="${{ env.DDNS_HOSTNAME }}",ddns_username="${{ env.DDNS_USERNAME }}",ddns_password="${{ env.DDNS_PASSWORD }}",vpn_password="${{ env.VPN_PASSWORD }}",vpn_cert="${{ env.VPN_CERT }}",vpn_key="${{ env.VPN_KEY }}"
          fi

          # Stop other running instances asynchronously to satisfy GCP Always Free constraints
          RUNNING_INSTANCES=$(gcloud compute instances list \
            --filter="name ~ ^trusttunnel-vpn- AND name != $TARGET_INSTANCE AND status = RUNNING" \
            --format="value(name,zone)" 2>/dev/null)

          if [ -n "$RUNNING_INSTANCES" ]; then
            echo "Stopping other running instances asynchronously:"
            echo "$RUNNING_INSTANCES"
            echo "$RUNNING_INSTANCES" | while read -r name zone; do
              echo "Stopping instance $name in zone $zone..."
              gcloud compute instances stop "$name" --zone="$zone" --async --quiet
            done
          fi

          # Start or reset target instance
          STATUS=$(gcloud compute instances describe "$TARGET_INSTANCE" --zone="$TARGET_ZONE" --format="value(status)" 2>/dev/null)
          if [ "$STATUS" != "RUNNING" ]; then
              echo "Starting target instance $TARGET_INSTANCE..."
              gcloud compute instances start "$TARGET_INSTANCE" --zone="$TARGET_ZONE" --quiet
          else
              echo "Target instance is already running. Resetting to apply any metadata changes..."
              gcloud compute instances reset "$TARGET_INSTANCE" --zone="$TARGET_ZONE" --quiet
          fi

      - name: Ensure GCP Firewall Rules are Set
        run: |
          if ! gcloud compute firewall-rules describe allow-trusttunnel >/dev/null 2>&1; then
            echo "Creating firewall rule to allow TrustTunnel port 443..."
            gcloud compute firewall-rules create allow-trusttunnel \
              --allow=tcp:443 \
              --target-tags=trusttunnel-vpn \
              --description="Allow TrustTunnel VPN TCP port 443"
          else
            echo "Firewall rule already exists."
          fi
