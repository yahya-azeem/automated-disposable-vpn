---
- name: Ensure wireguard and required packages are installed (Alpine)
  apk:
    name:
      - wireguard-tools
      - iptables
      - iproute2
    state: present
    update_cache: yes
  when: ansible_os_family == 'Alpine'

- name: Ensure wireguard and required packages are installed (Amazon Linux / RHEL)
  yum:
    name:
      - wireguard-tools
      - iptables
      - iproute
    state: present
  when: ansible_os_family == 'RedHat'

- name: Enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Ensure WireGuard config directory exists
  file:
    path: /etc/wireguard
    state: directory
    mode: '0700'

- name: Generate WireGuard private key for Server
  shell: wg genkey
  register: server_privkey_result
  changed_when: false

- name: Generate WireGuard public key for Server
  shell: echo "{{ server_privkey_result.stdout }}" | wg pubkey
  register: server_pubkey_result
  changed_when: false

- name: Generate WireGuard private key for iOS Client
  shell: wg genkey
  register: client_privkey_result
  changed_when: false

- name: Generate WireGuard public key for iOS Client
  shell: echo "{{ client_privkey_result.stdout }}" | wg pubkey
  register: client_pubkey_result
  changed_when: false

- name: Set facts for keys
  set_fact:
    server_private_key: "{{ server_privkey_result.stdout }}"
    server_public_key: "{{ server_pubkey_result.stdout }}"
    client_private_key: "{{ client_privkey_result.stdout }}"
    client_public_key: "{{ client_pubkey_result.stdout }}"

- name: Fetch public IP (useful for local mode where it might not be known)
  uri:
    url: http://ifconfig.me/ip
    return_content: yes
  register: public_ip_fetch
  when: public_ip is not defined or public_ip == '127.0.0.1'

- name: Set public IP fact
  set_fact:
    server_public_ip: "{{ public_ip | default(public_ip_fetch.content) }}"

- name: Generate server configuration wg0.conf
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
  notify:
    - restart wg-quick
    - restart wg-quick systemd
    - restart wg-quick docker

- name: Generate iOS client configuration client.conf
  template:
    src: client.conf.j2
    dest: /root/client.conf
    mode: '0600'

- name: Display client configuration for iOS Shortcut
  command: cat /root/client.conf
  register: client_config_content

- name: Fetch iOS Client config to Ansible runner
  fetch:
    src: /root/client.conf
    dest: fetched/
    flat: no

- name: Output iOS Client config to console
  debug:
    msg: "{{ client_config_content.stdout }}"

- name: Start Wireguard manually in Docker
  command: wg-quick up wg0
  when: ansible_virtualization_type == 'docker' or ansible_virtualization_role == 'guest'
  register: wg_quick_result
  changed_when: "'already exists' not in wg_quick_result.stderr"
  failed_when: "wg_quick_result.rc != 0 and 'already exists' not in wg_quick_result.stderr"
  ignore_errors: yes

- name: Enable wg-quick@wg0 service (Alpine OpenRC)
  service:
    name: wg-quick
    enabled: yes
    state: started
  when: ansible_os_family == 'Alpine' and ansible_virtualization_type != 'docker'
  ignore_errors: yes

- name: Enable wg-quick@wg0 service (Systemd)
  systemd:
    name: wg-quick@wg0
    enabled: yes
    state: started
    daemon_reload: yes
  when: ansible_os_family != 'Alpine' and ansible_virtualization_type != 'docker'
  ignore_errors: yes
